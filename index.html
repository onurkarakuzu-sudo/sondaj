<title>Sondaj Takip</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;background:#0f172a;color:#e2e8f0;height:100%;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior-y:contain;padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left)}
input,button,select,textarea{font-family:inherit;-webkit-appearance:none;appearance:none;font-size:16px}
input:focus,select:focus{outline:2px solid #3b82f6;outline-offset:-1px}
.hdr{border-bottom:1px solid #334155;padding:12px 14px;padding-top:max(12px,env(safe-area-inset-top));display:flex;align-items:center;justify-content:space-between;background:#0f172a;position:sticky;top:0;z-index:50;flex-wrap:wrap;gap:8px}
.logo{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,#38bdf8,#818cf8);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#fff;flex-shrink:0}
.cnt{padding:12px 14px;max-width:1200px;margin:0 auto;padding-bottom:max(20px,env(safe-area-inset-bottom))}
.cd{background:#1e293b;border:1px solid #334155;border-radius:12px;margin-bottom:6px}
.cd.on{border:2px solid #3b82f6;background:#172554}
.cd.ok{border-color:#166534;background:#0f2918}
.cd.wip{border-color:#854d0e;background:#1a1a0f}
.btn{padding:10px 14px;border-radius:8px;border:none;cursor:pointer;font-size:12px;font-weight:700;color:#fff;font-family:inherit;display:inline-flex;align-items:center;justify-content:center;min-height:40px;touch-action:manipulation}
.inp{padding:10px 12px;background:#0f172a;border:1px solid #334155;border-radius:8px;color:#e2e8f0;font-size:16px;font-family:inherit;outline:none;width:100%;min-height:44px}
.tabs{display:flex;gap:5px;margin-bottom:12px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:4px}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:10px 14px;border-radius:10px;border:2px solid #334155;cursor:pointer;font-size:11px;font-weight:700;background:#1e293b;color:#64748b;font-family:inherit;white-space:nowrap;min-height:40px;touch-action:manipulation}
.tab.on{color:#fff}
.ck{display:inline-flex;align-items:center;gap:6px;cursor:pointer;font-size:12px;user-select:none;padding:6px;min-width:110px;min-height:40px;touch-action:manipulation}
.ckb{width:22px;height:22px;border-radius:5px;border:2px solid;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block}
table{width:100%;border-collapse:collapse;font-size:12px}
th{padding:8px 6px;text-align:left;font-size:10px;color:#64748b;font-weight:700;border-bottom:2px solid #334155}
td{padding:8px 6px;border-bottom:1px solid #334155;font-size:11px;cursor:pointer;min-height:40px}
.light body,.light{background:#f1f5f9;color:#1e293b}
.light .hdr{background:#f1f5f9;border-color:#e2e8f0}
.light .cd{background:#fff;border-color:#e2e8f0}
.light .cd.on{background:#eff6ff;border-color:#60a5fa}
.light .cd.ok{background:#f0fdf4;border-color:#86efac}
.light .cd.wip{background:#fffbeb;border-color:#fde68a}
.light .inp{background:#f1f5f9;border-color:#e2e8f0;color:#1e293b}
.light .tab{background:#fff;border-color:#e2e8f0}
.light th,.light td{border-color:#e2e8f0}
@media(min-width:768px){.btn{font-size:13px;padding:8px 14px;min-height:36px}.inp{font-size:14px;min-height:38px;padding:8px 10px}.tab{padding:8px 16px;font-size:12px}.ck{font-size:11px;min-height:32px}.cnt{padding:16px 20px}}
@media(max-width:380px){.tab{padding:8px 10px;font-size:10px}.btn{padding:8px 10px;font-size:11px}}
</style>

<body>
<div id="app"></div>
<script>
var SEED=[];
var CK=["sondaj","foto","lab","jeofizik","rapor","teslim_ok"];
var CKL={sondaj:"Sondaj",foto:"Fotoğraf",lab:"Lab",jeofizik:"Jeofizik",rapor:"Rapor",teslim_ok:"Teslim"};
var CKC={sondaj:"#38bdf8",foto:"#a78bfa",lab:"#ec4899",jeofizik:"#f97316",rapor:"#22c55e",teslim_ok:"#eab308"};
var $ = document.getElementById.bind(document);
function M(n){return n?n.toLocaleString("tr-TR")+" TL":"0 TL"}
function TD(){return new Date().toISOString().split("T")[0]}
function LS(k,v){if(v!==undefined){try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}}try{var d=localStorage.getItem(k);return d?JSON.parse(d):null}catch(e){return null}}
function SV(){LS("z_jb",S.jobs);LS("z_ck",S.checks);LS("z_th",S.tahsilat);LS("z_tr",S.trash);LS("z_rh",S.rehber)}

var S={
  jobs:LS("z_jb")||SEED,checks:LS("z_ck")||{},tahsilat:LS("z_th")||{},trash:LS("z_tr")||[],rehber:LS("z_rh")||{},
  view:"is",search:"",openId:null,showAdd:false,showBk:false,locked:true,theme:"dark",
  selIv:null,rehEdit:null,confirmDel:null
};
if(new Date().getHours()>=7&&new Date().getHours()<19)S.theme="light";

function getCk(id,f){return!!S.checks[id+"_"+f]}
function getTh(id){return S.tahsilat[""+id]||{amount:0,date:"",note:""}}
function getBk(r){return r.tu-(getTh(r.id).amount||0)}
function gp(id){if(getCk(id,"teslim_ok"))return 6;var d=0;CK.forEach(function(c){if(getCk(id,c))d++});return d}
function pct(id){return getCk(id,"teslim_ok")?100:Math.round(gp(id)/6*100)}
function allJ(){return(S.jobs||SEED).slice().sort(function(a,b){return a.tr>b.tr?-1:a.tr<b.tr?1:b.id-a.id})}
function actJ(){return allJ().filter(function(r){return r.ts!=="TESLİM"&&r.ts!=="İPTAL"})}
function fltJ(){
  var v=S.view,l=v==="is"?actJ():v==="eksik"?actJ().filter(function(r){return gp(r.id)<6}):allJ();
  if(S.search){var q=S.search.toLowerCase().trim(),dm=q.match(/^(\d+)\s*[-\/]\s*(\d+)$/);
    if(dm)l=l.filter(function(r){return r.ad&&r.ad.indexOf(dm[1])>=0&&r.pr&&r.pr.indexOf(dm[2])>=0});
    else l=l.filter(function(r){return(r.nm||"").toLowerCase().indexOf(q)>=0||(r.iv||"").toLowerCase().indexOf(q)>=0||(r.ad||"").indexOf(q)>=0||(r.pr||"").indexOf(q)>=0})}
  return l}
function cariJ(){var m={};allJ().forEach(function(r){var k=r.iv||"?";if(!m[k])m[k]={iv:k,tu:0,th:0,bk:0,n:0,recs:[]};m[k].tu+=r.tu;m[k].th+=(getTh(r.id).amount||0);m[k].bk+=getBk(r);m[k].n++;m[k].recs.push(r)});return Object.values(m).sort(function(a,b){return b.bk-a.bk})}

// === DOM HELPERS ===
function E(tag,cls,html){var el=document.createElement(tag);if(cls)el.className=cls;if(html!==undefined)el.innerHTML=html;return el}
function STY(el,s){Object.assign(el.style,s);return el}
function ON(el,ev,fn){el.addEventListener(ev,fn);return el}
function ADD(parent){for(var i=1;i<arguments.length;i++)if(arguments[i])parent.appendChild(arguments[i]);return parent}

// === RENDER ===
function R(){
  // Save focused element
  var ae=document.activeElement;
  var fid=ae?ae.id:"";
  var fval=ae?ae.value:"";
  var fsel=ae?ae.selectionStart:-1;
  // If editing tahsilat, save first
  if(fid&&fid.indexOf("th_")===0){var rid=fid.split("_").pop();saveTh(rid)}
  
  var dk=S.theme==="dark";
  document.documentElement.className=dk?"":"light";
  var tc=document.querySelector('meta[name="theme-color"]');
  if(tc)tc.content=dk?"#0f172a":"#f1f5f9";
  var app=$("app");app.innerHTML="";

  // === LOGIN ===
  if(S.locked){
    var w=STY(E("div"),{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center"});
    var bx=STY(E("div","cd"),{padding:"24px",width:"90%",maxWidth:"320px",textAlign:"center",borderRadius:"16px"});
    bx.innerHTML='<div style="width:48px;height:48px;border-radius:12px;background:linear-gradient(135deg,#38bdf8,#818cf8);display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;color:#fff;margin:0 auto 14px">₺</div><div style="font-size:15px;font-weight:700;margin-bottom:4px">CARİ HESAP & İŞ TAKİP</div><div style="font-size:10px;color:#64748b;margin-bottom:16px">Şifre girin veya yeni oluşturun</div>';
    var pi=E("input","inp");pi.type="password";pi.placeholder="Şifre";STY(pi,{textAlign:"center",letterSpacing:"6px",fontSize:"18px",marginBottom:"12px",minHeight:"50px"});
    pi.id="pinInp";
    ON(pi,"keydown",function(e){if(e.key==="Enter")doLogin()});
    var lb=E("button","btn","\u{1F513} Giriş");STY(lb,{width:"100%",padding:"14px",fontSize:"16px",background:"#3b82f6",borderRadius:"10px",marginBottom:"12px"});
    ON(lb,"click",doLogin);
    var fb=STY(E("button","","\u015Eifremi Unuttum"),{background:"none",border:"none",color:"#64748b",fontSize:"12px",cursor:"pointer",textDecoration:"underline",padding:"10px",minHeight:"44px"});
    ON(fb,"click",function(){var m=prompt("Master şifre girin:");if(m==="SONKA1500"){localStorage.removeItem("z_pw");S.locked=false;R()}else if(m)alert("Yanlış master şifre")});
    ADD(bx,pi,lb,fb);ADD(w,bx);ADD(app,w);
    setTimeout(function(){var inp=$("pinInp");if(inp)inp.focus()},100);
    return}

  // === HEADER ===
  var hdr=E("div","hdr");
  var hl=STY(E("div"),{display:"flex",alignItems:"center",gap:"8px"});
  hl.innerHTML='<div class="logo">₺</div><div style="font-size:13px;font-weight:700">CARİ HESAP & İŞ TAKİP</div>';
  var hr=STY(E("div"),{display:"flex",gap:"4px"});
  var nbtn=E("button","btn","+ Yeni");STY(nbtn,{background:"#22c55e",padding:"8px 14px",fontSize:"13px"});ON(nbtn,"click",function(){S.showAdd=!S.showAdd;R()});
  var tbtn=STY(E("button","",dk?"☀":"🌙"),{width:"40px",height:"40px",borderRadius:"8px",border:"1px solid "+(dk?"#334155":"#e2e8f0"),background:dk?"#1e293b":"#fff",cursor:"pointer",fontSize:"18px",display:"flex",alignItems:"center",justifyContent:"center"});
  ON(tbtn,"click",function(){S.theme=dk?"light":"dark";R()});
  var lbtn=STY(E("button","","\u23FB"),{width:"40px",height:"40px",borderRadius:"8px",border:"1px solid "+(dk?"#334155":"#e2e8f0"),background:dk?"#1e293b":"#fff",cursor:"pointer",fontSize:"16px",display:"flex",alignItems:"center",justifyContent:"center",color:"#64748b"});
  ON(lbtn,"click",function(){S.locked=true;R()});
  ADD(hr,nbtn,tbtn,lbtn);ADD(hdr,hl,hr);ADD(app,hdr);

  var cnt=E("div","cnt");

  // === ADD FORM ===
  if(S.showAdd){
    var fm=STY(E("div","cd"),{padding:"12px",marginBottom:"10px"});
    fm.innerHTML='<div style="font-size:12px;font-weight:700;margin-bottom:8px">YENİ İŞ EKLE</div><div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:6px"><div><div style="font-size:8px;color:#64748b">TARİH</div><input class="inp" type="date" id="nj_tr" value="'+TD()+'"></div><div><div style="font-size:8px;color:#64748b">İŞVEREN</div><input class="inp" id="nj_iv" placeholder="İşveren" list="dl_iv" autocomplete="off"></div><div><div style="font-size:8px;color:#64748b">MÜLKİYET *</div><input class="inp" id="nj_nm" placeholder="Mülkiyet" list="dl_nm" autocomplete="off"></div><div><div style="font-size:8px;color:#64748b">İLÇE</div><input class="inp" id="nj_il" placeholder="İlçe" list="dl_il" autocomplete="off"></div><div><div style="font-size:8px;color:#64748b">MAHALLE</div><input class="inp" id="nj_mh" placeholder="Mahalle" list="dl_mh" autocomplete="off"></div><div><div style="font-size:8px;color:#64748b">ADA</div><input class="inp" id="nj_ad" placeholder="Ada"></div><div><div style="font-size:8px;color:#64748b">PARSEL</div><input class="inp" id="nj_pr" placeholder="Parsel"></div><div><div style="font-size:8px;color:#64748b">TUTAR</div><input class="inp" type="number" id="nj_tu" placeholder="0"></div></div>';
    var fb2=STY(E("div"),{display:"flex",gap:"6px",marginTop:"8px"});
    var sv=E("button","btn","Kaydet");STY(sv,{background:"#22c55e"});ON(sv,"click",function(){
      var nm=$("nj_nm").value;if(!nm){alert("Mülkiyet zorunlu");return}
      var ids=allJ().map(function(j){return j.id});var nid=Math.max.apply(null,ids.concat([0]))+1;
      S.jobs.unshift({id:nid,iv:$("nj_iv").value||"PİYASA",tr:$("nj_tr").value||TD(),nm:nm,il:$("nj_il").value,mh:$("nj_mh").value,ad:$("nj_ad").value,pr:$("nj_pr").value,tu:parseInt($("nj_tu").value)||0,ts:"",sn:""});
      SV();S.showAdd=false;R()});
    var cn=E("button","btn","İptal");STY(cn,{background:"#64748b"});ON(cn,"click",function(){S.showAdd=false;R()});
    ADD(fb2,sv,cn);ADD(fm,fb2);ADD(cnt,fm)}

  // === STATS ===
  var ca=cariJ(),tots={tu:0,bk:0};ca.forEach(function(c){tots.tu+=c.tu;tots.bk+=c.bk});
  var sr=STY(E("div"),{display:"flex",gap:"6px",marginBottom:"10px",flexWrap:"wrap",alignItems:"center"});
  var bkc=STY(E("div","cd"),{padding:"8px 12px",cursor:"pointer",marginBottom:"0"});
  bkc.innerHTML='<div style="font-size:8px;color:#94a3b8">BAKİYE '+(S.showBk?"◉":"◎")+'</div><div style="font-size:17px;font-weight:700;color:#ef4444">'+(S.showBk?M(tots.bk):"****")+'</div>';
  ON(bkc,"click",function(){S.showBk=!S.showBk;R()});
  var ekc=STY(E("div","cd"),{padding:"8px 12px",marginBottom:"0"});
  var eksik=actJ().filter(function(r){return gp(r.id)<6}).length;
  ekc.innerHTML='<div style="font-size:8px;color:#94a3b8">EKSİK/TOPLAM</div><div style="font-size:17px;font-weight:700;color:#eab308">'+eksik+'<span style="font-size:11px;color:#64748b">/'+allJ().length+'</span></div>';
  var bb=E("button","btn","💾 Yedekle");STY(bb,{background:"#3b82f6"});ON(bb,"click",doBackup);
  var rb=E("button","btn","📂 Excel/JSON Yükle");STY(rb,{background:"#f97316"});ON(rb,"click",doRestore);
  var eb=E("button","btn","📄 Excel");STY(eb,{background:"#059669"});ON(eb,"click",doExcel);
  ADD(sr,bkc,ekc,bb,rb,eb);ADD(cnt,sr);

  // === TABS ===
  var tabs=E("div","tabs");
  [{id:"is",l:"İŞ TAKİP",c:"#3b82f6"},{id:"eksik",l:"EKSİK",c:"#f97316"},{id:"biv",l:"BORÇLU İŞV.",c:"#dc2626"},{id:"bnm",l:"BORÇLU MÜL.",c:"#be123c"},{id:"cari",l:"CARİ",c:"#8b5cf6"},{id:"all",l:"ENVANTER",c:"#64748b"},{id:"rapor",l:"RAPOR",c:"#0891b2"},{id:"rehber",l:"REHBER",c:"#059669"},{id:"takvim",l:"TAKVİM",c:"#7c3aed"}].forEach(function(t){
    var b=E("button","tab"+(S.view===t.id?" on":""),t.l);
    if(S.view===t.id){b.style.background=t.c;b.style.borderColor=t.c}
    ON(b,"click",function(){S.view=t.id;S.openId=null;S.selIv=null;R()});
    ADD(tabs,b)});
  ADD(cnt,tabs);

  // === SEARCH ===
  var si=E("input","inp");si.placeholder="İsim, işveren, ada, parsel ara...";si.value=S.search;si.id="searchInp";
  STY(si,{marginBottom:"10px"});
  var _st=null;
  ON(si,"input",function(){S.search=si.value;clearTimeout(_st);_st=setTimeout(function(){R()},300)});
  ADD(cnt,si);

  // === VIEWS ===
  var list=fltJ();

  if(S.view==="is"||S.view==="eksik"){
    if(list.length>0){var ab=STY(E("div"),{display:"flex",gap:"4px",marginBottom:"6px"});
      var wb2=E("button","btn","WA");STY(wb2,{background:"#22c55e"});ON(wb2,"click",function(){doWa(list,S.search||"Tüm")});
      ADD(ab,wb2,eb.cloneNode(true));ADD(cnt,ab)}
    ADD(cnt,STY(E("div","",list.length+" kayıt"),{fontSize:"9px",color:"#64748b",marginBottom:"4px"}));
    list.forEach(function(r){ADD(cnt,mkCard(r))});
    if(!list.length)ADD(cnt,STY(E("div","","Kayıt yok"),{padding:"20px",textAlign:"center",color:"#64748b"}));

  }else if(S.view==="all"){
    ADD(cnt,STY(E("div","","ENVANTER ("+list.length+")"),{fontSize:"11px",fontWeight:700,marginBottom:"6px"}));
    var tw=STY(E("div"),{overflow:"auto"});var tbl=E("table");tbl.style.minWidth="600px";
    tbl.innerHTML='<thead><tr><th>TARİH</th><th>İŞVEREN</th><th>MÜLKİYET</th><th>YER</th><th>ADA</th><th>PARSEL</th><th style="text-align:right">TUTAR</th><th style="text-align:right">BAKİYE</th><th>%</th></tr></thead>';
    var tb=E("tbody");
    list.forEach(function(r){var bk=getBk(r),p=pct(r.id);
      var tr=E("tr");tr.innerHTML='<td style="color:#64748b;font-size:9px">'+r.tr+'</td><td style="color:#94a3b8;font-size:9px">'+r.iv+'</td><td style="font-weight:600">'+r.nm+'</td><td style="color:#64748b;font-size:9px">'+r.il+'/'+r.mh+'</td><td style="font-size:9px">'+(r.ad||"-")+'</td><td style="font-size:9px">'+(r.pr||"-")+'</td><td style="text-align:right;color:#38bdf8;font-size:9px">'+(r.tu?M(r.tu):"-")+'</td><td style="text-align:right;font-weight:700;color:'+(bk>0?"#ef4444":"#22c55e")+';font-size:9px">'+(bk?M(bk):"-")+'</td><td style="font-size:8px;color:'+(p===100?"#22c55e":"#38bdf8")+'">'+p+'%</td>';
      ON(tr,"click",function(){S.view="is";S.openId=r.id;S.search="";R()});
      ADD(tb,tr)});
    ADD(tbl,tb);ADD(tw,tbl);ADD(cnt,tw);

  }else if(S.view==="biv"){
    ca.filter(function(g){return g.bk>0}).forEach(function(g){
      var c=STY(E("div","cd"),{cursor:"pointer"});
      c.innerHTML='<div style="padding:10px 12px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px"><div><div style="font-size:12px;font-weight:700">'+g.iv+'</div><div style="font-size:9px;color:#64748b">'+g.n+' kayıt</div></div><span style="background:#fecaca;color:#991b1b;padding:5px 12px;border-radius:7px;font-size:14px;font-weight:700">'+M(g.bk)+'</span></div>';
      ON(c,"click",function(){S.view="cari";S.selIv=g.iv;R()});ADD(cnt,c)});

  }else if(S.view==="bnm"){
    allJ().filter(function(r){return getBk(r)>0}).sort(function(a,b){return getBk(b)-getBk(a)}).forEach(function(r){
      var c=STY(E("div","cd"),{cursor:"pointer"});
      c.innerHTML='<div style="padding:10px 12px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px"><div><div style="font-size:12px;font-weight:700">'+r.nm+'</div><div style="font-size:9px;color:#64748b">'+r.iv+' | '+r.tr+' | '+r.ad+'-'+r.pr+'</div></div><span style="background:#fecaca;color:#991b1b;padding:5px 12px;border-radius:7px;font-size:14px;font-weight:700">'+M(getBk(r))+'</span></div>';
      ON(c,"click",function(){S.view="is";S.openId=r.id;S.search="";R()});ADD(cnt,c)});

  }else if(S.view==="cari"&&!S.selIv){

function delJob(id){

  S.jobs=allJ().filter(function(j){return j.id!==id});

function doRestore(){
  var input=document.createElement("input");input.type="file";input.accept=".xlsx,.xls,.json";
  input.onchange=function(e){var file=e.target.files[0];if(!file)return;
    var ext=file.name.split(".").pop().toLowerCase();
    var reader=new FileReader();
    if(ext==="json"){
      reader.onload=function(ev){
        try{var d=JSON.parse(ev.target.result);
          if(d.jobs){S.jobs=d.jobs;LS("z_jb",d.jobs)}
          if(d.checks){S.checks=d.checks;LS("z_ck",d.checks)}
          if(d.tahsilat){S.tahsilat=d.tahsilat;LS("z_th",d.tahsilat)}
          if(d.rehber){S.rehber=d.rehber;LS("z_rh",d.rehber)}
          if(d.trash){S.trash=d.trash;LS("z_tr",d.trash)}
          R();alert("Yüklendi: "+S.jobs.length+" kayıt")}
        catch(err){alert("JSON okunamadı")}};
      reader.readAsText(file);
    }else{
      loadXLSX(function(){
      reader.onload=function(ev){
        try{
          var wb=XLSX.read(ev.target.result,{type:"array",cellDates:true});
          var ws=wb.Sheets[wb.SheetNames[0]];
          var rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:""});
          if(rows.length<2){alert("Veri bulunamadı");return}
          var h=rows[0];var ci={};
          for(var i=0;i<h.length;i++){
            var hv=String(h[i]||"").toUpperCase().trim();
            if(hv==="İŞVEREN"||hv==="ISVEREN")ci.iv=i;
            if(hv==="TARİH"||hv==="TARIH")ci.tr=i;
            if(hv==="İSİM"||hv==="ISIM"||hv==="MÜLKİYET"||hv==="MULKIYET")ci.nm=i;
            if(hv==="İLÇE"||hv==="ILCE")ci.il=i;
            if(hv==="MAHALLE")ci.mh=i;
            if(hv==="ADA")ci.ad=i;
            if(hv==="PARSEL")ci.pr=i;
            if(hv==="SONDAJ")ci.sondaj=i;
            if(hv==="LAB")ci.lab=i;
            if(hv.indexOf("AÇIKLAMA")>=0||hv.indexOf("ACIKLAMA")>=0)ci.note=i;
            if(hv==="TESLİM"||hv==="TESLIM")ci.teslim=i;
            if(hv==="TUTAR")ci.tu=i;
            if(hv==="TAHSİLAT"||hv==="TAHSILAT")ci.th=i;
            if(hv==="TARİH2"||hv==="TARIH2")ci.tr2=i;
          }
          var jobs=[],checks={},tahsilat={};
          for(var r=1;r<rows.length;r++){
            var row=rows[r];
            var tr=row[ci.tr!==undefined?ci.tr:1];
            if(!tr)continue;
            if(tr instanceof Date){var dd=tr;tr=dd.getFullYear()+"-"+String(dd.getMonth()+1).padStart(2,"0")+"-"+String(dd.getDate()).padStart(2,"0")}
            else{tr=String(tr).split(" ")[0]}
            var rid=r-1;
            var clean=function(v){var s=String(v||"").trim();return s==="undefined"||s==="null"?"":s};
            var iv=clean(row[ci.iv!==undefined?ci.iv:0]);
            var nm=clean(row[ci.nm!==undefined?ci.nm:2]);
            var il=clean(row[ci.il!==undefined?ci.il:3]);
            var mh=clean(row[ci.mh!==undefined?ci.mh:4]);
            var ad=clean(row[ci.ad!==undefined?ci.ad:5]);
            var pr=clean(row[ci.pr!==undefined?ci.pr:6]);
            var sondaj=clean(row[ci.sondaj!==undefined?ci.sondaj:7]);
            var lab=clean(row[ci.lab!==undefined?ci.lab:8]);
            var note=clean(row[ci.note!==undefined?ci.note:9]);
            var teslim=clean(row[ci.teslim!==undefined?ci.teslim:10]);
            var tu=parseFloat(row[ci.tu!==undefined?ci.tu:11])||0;
            var thv=parseFloat(row[ci.th!==undefined?ci.th:12])||0;
            var tr2=ci.tr2!==undefined?clean(row[ci.tr2]):"";
            if(tr2 instanceof Date){var dd2=tr2;tr2=dd2.getFullYear()+"-"+String(dd2.getMonth()+1).padStart(2,"0")+"-"+String(dd2.getDate()).padStart(2,"0")}

            jobs.push({id:rid,iv:iv,tr:tr,nm:nm,il:il,mh:mh,ad:ad,pr:pr,tu:Math.round(tu),ts:teslim,sn:""});
            if(sondaj&&(sondaj.toUpperCase().indexOf("YAPILDI")>=0||sondaj.indexOf("202")>=0))checks[rid+"_sondaj"]=true;
            if(lab&&(lab.toUpperCase().indexOf("YAPILDI")>=0||lab.indexOf("202")>=0||lab==="X"))checks[rid+"_lab"]=true;
            if(teslim&&teslim.toUpperCase().indexOf("TESLİM")>=0)checks[rid+"_teslim_ok"]=true;
            if(thv>0)tahsilat[""+rid]={amount:Math.round(thv),date:tr2?String(tr2).split(" ")[0]:"",note:note};
          }
          S.jobs=jobs;S.checks=checks;S.tahsilat=tahsilat;
          LS("z_jb",jobs);LS("z_ck",checks);LS("z_th",tahsilat);
          R();alert("Excel yüklendi: "+jobs.length+" kayıt");
        }catch(err){alert("Excel okunamadı: "+err.message)}};
      reader.readAsArrayBuffer(file);
      });
    }};input.click();
}

function doExcel(){
  var csv="TARIH;ISVEREN;MULKIYET;ILCE;MAHALLE;ADA;PARSEL;TUTAR;TAHSILAT;BAKIYE\n";
  allJ().forEach(function(r){var t=getTh(r.id);csv+=[r.tr,r.iv,r.nm,r.il,r.mh,r.ad,r.pr,r.tu,t.amount||0,getBk(r)].join(";")+"\n"});
  var a=document.createElement("a");a.href=URL.createObjectURL(new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8"}));
  a.download="cari_"+TD()+".csv";a.click();
}

function doWa(recs,name){
  var tTu=recs.reduce(function(a,r){return a+r.tu},0);
  var tTh=recs.reduce(function(a,r){return a+(getTh(r.id).amount||0)},0);
  var m="*"+name+"*\nBakiye: "+M(tTu-tTh)+"\n\n";
  recs.slice(0,20).forEach(function(r){m+="- "+r.nm+" ("+r.tr+") B:"+M(getBk(r))+"\n"});
  window.open("https://wa.me/?text="+encodeURIComponent(m),"_blank");
}
